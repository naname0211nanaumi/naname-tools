<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Liker Bottle – OBS Source</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:300px; height:480px; background:transparent; overflow:hidden; }

  .bottle-area {
    width:300px; height:480px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  /* 接続状態インジケーター（右下・小さく） */
  #connStatus {
    position:absolute; bottom:6px; right:10px;
    font-family:'Cormorant Garamond', serif;
    font-size:10px; letter-spacing:0.05em;
    opacity:0.55; transition:opacity 0.4s;
  }
  #connStatus.onecomme { color:#7bcfff; }
<br>  #connStatus.tiktok   { color:#ff7eb3; }
  #connStatus.none     { color:#888; }
</style>
</head>
<body>
<div class="bottle-area">
  <svg id="bottleSvg" viewBox="0 0 240 400"
       xmlns="http://www.w3.org/2000/svg"
       style="width:240px;height:400px;overflow:visible;">
  </svg>
  <div id="connStatus" class="none">—</div>
</div>

<script>
// ============================================================
//  状態
// ============================================================
const state = {
  likes : 0,
  goal  : 1000,
  liquidColor: { top:'#5082d2', bottom:'#0d2370' },
};

// ============================================================
//  SVG ユーティリティ
// ============================================================
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ============================================================
//  SVG 構築
// ============================================================
function buildSVG() {
  const svg = document.getElementById('bottleSvg');
  svg.innerHTML = '';

  const defs = el('defs');

  // --- clipPath（瓶内部）---
  const clip = el('clipPath', { id:'bottleClip' });
  clip.appendChild(el('path', {
    d:'M100,88 Q80,92 62,108 Q38,130 36,162 L34,210 Q32,255 38,278 Q50,312 76,326 Q88,332 120,333 Q152,332 164,326 Q190,312 202,278 Q208,255 206,210 L204,162 Q202,130 178,108 Q160,92 140,88 Z'
  }));
  defs.appendChild(clip);

  // --- 液体グラデ ---
  const liqGrad = el('linearGradient', { id:'liquidGrad', x1:'0', y1:'0', x2:'0', y2:'1' });
  const gTop = el('stop', { offset:'0%',   'stop-color':'rgba(80,130,210,0.70)', id:'gTop' });
  const gBot = el('stop', { offset:'100%', 'stop-color':'rgba(15,35,110,0.93)',  id:'gBot' });
  liqGrad.appendChild(gTop);
  liqGrad.appendChild(gBot);
  defs.appendChild(liqGrad);

  // --- ガラスグラデ ---
  const glassGrad = el('linearGradient', { id:'glassGrad', x1:'0', y1:'0', x2:'1', y2:'0' });
  [
    ['0%',  'rgba(160,200,235,0.55)'],
    ['18%', 'rgba(200,228,250,0.28)'],
    ['50%', 'rgba(200,228,250,0.18)'],
    ['82%', 'rgba(200,228,250,0.28)'],
    ['100%','rgba(160,200,235,0.55)'],
  ].forEach(([o,c]) => glassGrad.appendChild(el('stop', { offset:o, 'stop-color':c })));
  defs.appendChild(glassGrad);

  // --- クリスタルグラデ ---
  const crystalGrad = el('radialGradient', { id:'crystalGrad', cx:'38%', cy:'32%' });
  [
    ['0%',  'rgba(245,252,255,0.92)'],
    ['55%', 'rgba(160,210,252,0.65)'],
    ['100%','rgba(80,145,215,0.42)'],
  ].forEach(([o,c]) => crystalGrad.appendChild(el('stop', { offset:o, 'stop-color':c })));
  defs.appendChild(crystalGrad);

  // --- glow filter ---
  const filter = el('filter', { id:'glow', x:'-50%', y:'-50%', width:'200%', height:'200%' });
  const fe = el('feGaussianBlur', { stdDeviation:'3', result:'blur' });
  filter.appendChild(fe);
  defs.appendChild(filter);

  // --- 波アニメーション ---
  const waveStyle = document.createElementNS(NS, 'style');
  waveStyle.textContent = `
    @keyframes wave1 { 0%{d:path("M34,0 Q77,8 120,0 Q163,-8 206,0 L206,18 Q163,10 120,18 Q77,26 34,18 Z")} 50%{d:path("M34,0 Q77,-8 120,0 Q163,8 206,0 L206,18 Q163,26 120,18 Q77,10 34,18 Z")} 100%{d:path("M34,0 Q77,8 120,0 Q163,-8 206,0 L206,18 Q163,10 120,18 Q77,26 34,18 Z")} }
    @keyframes wave2 { 0%{d:path("M34,0 Q77,-6 120,0 Q163,6 206,0 L206,14 Q163,20 120,14 Q77,8 34,14 Z")} 50%{d:path("M34,0 Q77,6 120,0 Q163,-6 206,0 L206,14 Q163,8 120,14 Q77,20 34,14 Z")} 100%{d:path("M34,0 Q77,-6 120,0 Q163,6 206,0 L206,14 Q163,20 120,14 Q77,8 34,14 Z")} }
  `;
  defs.appendChild(waveStyle);
  svg.appendChild(defs);

  // --- 液体グループ（clip内）---
  const liquidG = el('g', { 'clip-path':'url(#bottleClip)', id:'liquidG' });

  const liquidRect = el('rect', {
    id:'liquidRect',
    x:'34', y:'88', width:'172', height:'245',
    fill:'url(#liquidGrad)'
  });
  liquidG.appendChild(liquidRect);

  // 波1
  const wave1 = el('path', {
    id:'waveEl1',
    fill:'rgba(120,170,255,0.35)',
    style:'animation:wave1 2.8s ease-in-out infinite'
  });
  liquidG.appendChild(wave1);
  // 波2
  const wave2 = el('path', {
    id:'waveEl2',
    fill:'rgba(80,130,220,0.22)',
    style:'animation:wave2 3.6s ease-in-out infinite reverse'
  });
  liquidG.appendChild(wave2);

  svg.appendChild(liquidG);

  // --- 瓶本体（ガラス）---
  svg.appendChild(el('path', {
    d:'M100,88 Q80,92 62,108 Q38,130 36,162 L34,210 Q32,255 38,278 Q50,312 76,326 Q88,332 120,333 Q152,332 164,326 Q190,312 202,278 Q208,255 206,210 L204,162 Q202,130 178,108 Q160,92 140,88 Z',
    fill:'url(#glassGrad)',
    stroke:'rgba(160,210,255,0.75)',
    'stroke-width':'2'
  }));
  // 内側微細アウトライン
  svg.appendChild(el('path', {
    d:'M108,92 Q90,96 74,112 Q52,134 50,164 L48,210 Q46,252 52,274 Q63,306 86,320 Q98,326 120,327 Q142,326 154,320 Q177,306 188,274 Q194,252 192,210 L190,164 Q188,134 166,112 Q150,96 132,92 Z',
    fill:'none', stroke:'rgba(220,240,255,0.12)', 'stroke-width':'1'
  }));

  // --- 首 ---
  svg.appendChild(el('path', {
    d:'M96,60 L96,88 Q108,93 120,93 Q132,93 144,88 L144,60 Z',
    fill:'rgba(180,210,240,0.3)',
    stroke:'rgba(200,228,255,0.65)',
    'stroke-width':'1.2'
  }));
  // 首の段差
  svg.appendChild(el('rect', {
    x:'90', y:'73', width:'60', height:'11', rx:'5',
    fill:'rgba(160,200,238,0.32)',
    stroke:'rgba(210,235,255,0.65)',
    'stroke-width':'1'
  }));

  // --- 蓋の台座 ---
  svg.appendChild(el('ellipse', {
    cx:'120', cy:'60', rx:'36', ry:'10',
    fill:'rgba(160,205,240,0.52)',
    stroke:'rgba(220,245,255,0.65)',
    'stroke-width':'1.2'
  }));

  // --- クリスタルカット蓋 ---
  svg.appendChild(el('path', {
    d:'M90,60 L84,44 L90,22 L120,12 L150,22 L156,44 L150,60 Z',
    fill:'url(#crystalGrad)',
    stroke:'rgba(220,245,255,0.65)',
    'stroke-width':'1.2'
  }));
  // カットライン
  [
    ['90','60','120','12'], ['150','60','120','12'],
    ['84','44','120','12'], ['156','44','120','12'],
    ['90','22','120','12'], ['150','22','120','12'],
  ].forEach(([x1,y1,x2,y2]) =>
    svg.appendChild(el('line', { x1,y1,x2,y2, stroke:'rgba(255,255,255,0.32)', 'stroke-width':'0.8' }))
  );
  [['86','40','154','40'],['89','26','151','26']].forEach(([x1,y1,x2,y2]) =>
    svg.appendChild(el('line', { x1,y1,x2,y2, stroke:'rgba(255,255,255,0.18)', 'stroke-width':'0.7' }))
  );
  // 先端の輝き
  svg.appendChild(el('circle', {
    cx:'120', cy:'12', r:'3.2',
    fill:'rgba(255,255,255,0.92)',
    filter:'url(#glow)'
  }));

  // --- ガラスの光沢 ---
  svg.appendChild(el('path', {
    d:'M50,130 Q44,180 46,250 Q47,290 52,315',
    fill:'none', stroke:'rgba(240,250,255,0.16)',
    'stroke-width':'10', 'stroke-linecap':'round'
  }));
  svg.appendChild(el('path', {
    d:'M56,135 Q51,185 53,245',
    fill:'none', stroke:'rgba(255,255,255,0.09)',
    'stroke-width':'4', 'stroke-linecap':'round'
  }));

  // --- 台座の足 ---
  svg.appendChild(el('ellipse', {
    cx:'120', cy:'346', rx:'46', ry:'9',
    fill:'rgba(140,190,230,0.4)',
    stroke:'rgba(200,228,255,0.55)',
    'stroke-width':'1.2'
  }));
  svg.appendChild(el('rect', {
    x:'96', y:'333', width:'48', height:'14', rx:'2',
    fill:'rgba(140,190,230,0.26)',
    stroke:'rgba(200,228,255,0.50)',
    'stroke-width':'1'
  }));

  // --- 浮遊モチーフ（固定） ---
  // 💎 ジェム
  const gemG = el('g', { id:'gem', transform:'translate(68,230)' });
  const gemPath = el('path', {
    d:'M0,-9 L6,-3 L6,4 L0,9 L-6,4 L-6,-3 Z',
    fill:'rgba(100,180,255,0.72)',
    stroke:'rgba(200,240,255,0.85)', 'stroke-width':'0.8'
  });
  gemG.appendChild(gemPath);
  gemG.appendChild(el('line', { x1:'-6', y1:'-3', x2:'6', y2:'-3', stroke:'rgba(255,255,255,0.45)', 'stroke-width':'0.6' }));
  svg.appendChild(gemG);

  // ✦ スター
  const starG = el('g', { id:'star', transform:'translate(165,175)' });
  const starPath = el('path', {
    d:'M0,-8 L1.8,-1.8 L8,0 L1.8,1.8 L0,8 L-1.8,1.8 L-8,0 L-1.8,-1.8 Z',
    fill:'rgba(200,230,255,0.75)',
    stroke:'rgba(240,252,255,0.6)', 'stroke-width':'0.5'
  });
  starG.appendChild(starPath);
  svg.appendChild(starG);

  // --- パーセント表示（瓶中央）---
  const textG = el('g', { id:'percentG' });
  const percentNum = el('text', {
    id:'percentNum',
    x:'120', y:'222',
    'text-anchor':'middle',
    'dominant-baseline':'middle',
    fill:'rgba(220,240,255,0.92)',
    'font-family':'Cormorant Garamond, serif',
    'font-size':'40',
    'font-weight':'300',
    'letter-spacing':'0.02em'
  });
  percentNum.textContent = '0';
  textG.appendChild(percentNum);
  const percentSign = el('text', {
    id:'percentSign',
    x:'143', y:'225',
    'text-anchor':'start',
    'dominant-baseline':'middle',
    fill:'rgba(200,228,255,0.70)',
    'font-family':'Cormorant Garamond, serif',
    'font-size':'20',
    'font-weight':'300'
  });
  percentSign.textContent = '%';
  textG.appendChild(percentSign);
  svg.appendChild(textG);
}

// ============================================================
//  液体・表示更新
// ============================================================
function updateBottle() {
  const rawPct = (state.likes / Math.max(1, state.goal)) * 100;
  const pct    = Math.min(100, rawPct);
  const displayPct = Math.round(rawPct);

  // パーセント表示
  const numEl = document.getElementById('percentNum');
  const signEl = document.getElementById('percentSign');
  if (numEl) numEl.textContent = String(displayPct);

  // 数字幅に合わせてサインの位置を動かす
  if (numEl && signEl) {
    const digitCount = String(displayPct).length;
    const baseX = 120;
    const charW  = displayPct >= 100 ? 22 : (displayPct >= 10 ? 24 : 22);
    signEl.setAttribute('x', String(baseX + digitCount * charW * 0.5 + 2));
  }

  // 液体の高さ（瓶内部: y=88〜333, 高さ245px）
  const bottleTop    = 88;
  const bottleHeight = 245;
  const liquidH = (pct / 100) * bottleHeight;
  const liquidY = bottleTop + bottleHeight - liquidH;

  const rect = document.getElementById('liquidRect');
  if (rect) {
    rect.setAttribute('y', String(liquidY));
    rect.setAttribute('height', String(liquidH));
  }

  // 波の位置
  const wy = liquidY;
  ['waveEl1','waveEl2'].forEach((id, i) => {
    const w = document.getElementById(id);
    if (w) w.setAttribute('transform', `translate(0, ${wy})`);
  });

  // 液体色
  const topEl = document.getElementById('gTop');
  const botEl = document.getElementById('gBot');
  if (topEl) topEl.setAttribute('stop-color', hexToRgba(state.liquidColor.top, 0.70));
  if (botEl) botEl.setAttribute('stop-color', hexToRgba(state.liquidColor.bottom, 0.93));
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
//  接続状態表示
// ============================================================
function setStatus(mode, text) {
  const el = document.getElementById('connStatus');
  if (!el) return;
  el.className = mode;
  el.textContent = text;
}

// ============================================================
//  ① わんコメ WebSocket（優先）
//    ws://localhost:11180
//    type: "systemComment", data.service:"TikTok",
//    data.data.type:"like" で いいね枚数 data.data.likeCount
// ============================================================
let onecommeWs = null;
let onecommeActive = false;

function connectOneComme() {
  try {
    onecommeWs = new WebSocket('ws://localhost:11180');
  } catch(e) {
    scheduleOneCommeRetry();
    return;
  }

  onecommeWs.onopen = () => {
    onecommeActive = true;
    setStatus('onecomme', '◉ わんコメ');
    console.log('[OneComme] connected');
  };

  onecommeWs.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    // type: "comments" の中にsystemCommentが来るケース
    if (msg.type === 'comments' && Array.isArray(msg.data)) {
      msg.data.forEach(handleOneCommeComment);
      return;
    }
    // type: "comment" 単体
    if (msg.type === 'comment' && msg.data) {
      handleOneCommeComment(msg.data);
      return;
    }
    // type: "systemComment"
    if (msg.type === 'systemComment' && msg.data) {
      handleOneCommeComment(msg.data);
      return;
    }
  };

  onecommeWs.onclose = () => {
    onecommeActive = false;
    console.log('[OneComme] disconnected – retrying in 5s');
    setStatus('none', '— 待機中');
    scheduleOneCommeRetry();
  };

  onecommeWs.onerror = () => {
    // onclose が続けて呼ばれる
  };
}

function handleOneCommeComment(d) {
  // TikTokのいいね通知
  // service: "TikTok", data.type: "like"
  // または comment: "いいね" などのシステムコメント
  const service = (d.service || '').toLowerCase();
  const ctype   = (d.data && d.data.type) ? d.data.type.toLowerCase() : '';
  const comment = (d.comment || '').toLowerCase();

  if (service === 'tiktok') {
    if (ctype === 'like') {
      const count = (d.data && d.data.likeCount) ? parseInt(d.data.likeCount) : 1;
      state.likes += count;
      updateBottle();
      return;
    }
    // フォールバック: commentにlikeが含まれる場合
    if (comment.includes('like') || comment.includes('いいね')) {
      state.likes += 1;
      updateBottle();
    }
  }
}

function scheduleOneCommeRetry() {
  setTimeout(connectOneComme, 5000);
}

// ============================================================
//  ② TikFinity Third-Party API（フォールバック）
//    わんコメが接続されていないときだけ受け取る
//    TikFinity → POST http://localhost:8832/api/features/actions/exec
//    → server.js → ws://localhost:3000 → ここへ
// ============================================================
let tikfinityWs = null;
let tikfinityActive = false;

function connectTikFinity() {
  try {
    tikfinityWs = new WebSocket('ws://localhost:3000');
  } catch(e) {
    scheduleTikFinityRetry();
    return;
  }

  tikfinityWs.onopen = () => {
    tikfinityActive = true;
    if (!onecommeActive) setStatus('tiktok', '◉ TikFinity');
    console.log('[TikFinity] connected');
  };

  tikfinityWs.onmessage = (ev) => {
    // わんコメが生きていればTikFinityは無視
    if (onecommeActive) return;

    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'state' && msg.data) {
      state.likes = msg.data.likes ?? state.likes;
      state.goal  = msg.data.goal  ?? state.goal;
      if (msg.data.liquidColor) state.liquidColor = msg.data.liquidColor;
      updateBottle();
      setStatus('tiktok', '◉ TikFinity');
    }
  };

  tikfinityWs.onclose = () => {
    tikfinityActive = false;
    if (!onecommeActive) setStatus('none', '— 待機中');
    scheduleTikFinityRetry();
  };

  tikfinityWs.onerror = () => {};
}

function scheduleTikFinityRetry() {
  setTimeout(connectTikFinity, 8000);
}

// ============================================================
//  Controller（わんコメテンプレートのカスタムDock or 外部HTML）
//  postMessage で状態を受け取れるようにする
// ============================================================
window.addEventListener('message', (ev) => {
  const msg = ev.data;
  if (!msg || typeof msg !== 'object') return;

  switch (msg.type) {
    case 'set_likes':
      state.likes = Math.max(0, parseInt(msg.value) || 0);
      updateBottle(); break;
    case 'add_likes':
      state.likes = Math.max(0, state.likes + (parseInt(msg.value) || 0));
      updateBottle(); break;
    case 'set_goal':
      state.goal = Math.max(1, parseInt(msg.value) || 1000);
      updateBottle(); break;
    case 'reset':
      state.likes = 0;
      updateBottle(); break;
    case 'set_liquid_color':
      state.liquidColor = msg.value;
      updateBottle(); break;
  }
});

// ============================================================
//  初期化
// ============================================================
buildSVG();
updateBottle();
connectOneComme();
connectTikFinity();
</script>
</body>
</html>
