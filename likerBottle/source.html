<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Liker Bottle — Source</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: transparent;
    width: 300px;
    height: 480px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .bottle-area {
    position: relative;
    width: 260px;
    height: 420px;
    filter: drop-shadow(0 14px 40px rgba(20,40,80,0.4));
  }
  .bottle-area svg { width:100%; height:100%; overflow:visible; }
  .pct-overlay {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 95px;
    display: flex;
    flex-direction: row;
    align-items: baseline;
    gap: 2px;
    pointer-events: none;
    z-index: 10;
  }
  .pct-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 0 24px rgba(140,190,255,0.9), 0 2px 6px rgba(0,0,0,0.35);
    line-height: 1;
    transition: all 0.6s ease;
  }
  .pct-sign {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: rgba(200,230,255,0.85);
    text-shadow: 0 0 8px rgba(140,190,255,0.6);
    line-height: 1;
  }
  @keyframes wave1 { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  @keyframes wave2 { 0%{transform:translateX(0)} 100%{transform:translateX(50%)}  }
  @keyframes float-gentle {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    33%     { transform: translateY(-6px) rotate(2deg); }
    66%     { transform: translateY(-3px) rotate(-1.5deg); }
  }
  @keyframes twinkle { 0%,100%{opacity:0.5} 50%{opacity:1.0} }
  @keyframes smoke-rise {
    0%  { opacity:0;   transform:translateY(0) scaleX(1); }
    30% { opacity:0.5; transform:translateY(-14px) scaleX(1.3); }
    70% { opacity:0.3; transform:translateY(-30px) scaleX(0.8); }
    100%{ opacity:0;   transform:translateY(-50px) scaleX(1.1); }
  }
  @keyframes float-bubble {
    0%  { transform:translateY(0) scale(1); opacity:0.6; }
    100%{ transform:translateY(-80px) scale(0.5); opacity:0; }
  }
</style>
</head>
<body>
<div class="bottle-area" id="bottleArea">
  <div class="pct-overlay">
    <span class="pct-num" id="percentNum">0</span>
    <span class="pct-sign">%</span>
  </div>
</div>

<script>
// =============================================
// 状態管理（localStorageで controller と共有）
// =============================================
const STORAGE_KEY = 'likerBottle_state';

const DEFAULT_STATE = {
  likes: 0,
  goal: 1000,
  liquidColor: { top: '#5082d2', bottom: '#0d2370' },
  floatItems: ['gem', 'star'],
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? { ...DEFAULT_STATE, ...JSON.parse(s) } : { ...DEFAULT_STATE };
  } catch { return { ...DEFAULT_STATE }; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// =============================================
// TikFinity DAPI 接続（ws://localhost:21213）
// =============================================
let tikfinityWs = null;
let reconnectTimer = null;

function connectTikFinity() {
  if (tikfinityWs) return;
  tikfinityWs = new WebSocket('ws://localhost:21213/');

  tikfinityWs.onopen = () => {
    console.log('[TikFinity] 接続成功');
    localStorage.setItem('likerBottle_tikfinity', JSON.stringify({ connected: true, ts: Date.now() }));
  };

  tikfinityWs.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    // 全イベントをコンソールに出力（イベント名確認用）
    console.log('[TikFinity RAW]', JSON.stringify(msg));

    if (msg.event === 'like') {
      const count = msg.data?.likeCount ?? msg.data?.like_count ?? msg.data?.count ?? 1;
      state.likes += count;
      saveState(state);
      updateLiquid();
    }
  };

  tikfinityWs.onclose = () => {
    tikfinityWs = null;
    console.log('[TikFinity] 切断 — 5秒後に再接続');
    localStorage.setItem('likerBottle_tikfinity', JSON.stringify({ connected: false, ts: Date.now() }));
    reconnectTimer = setTimeout(connectTikFinity, 5000);
  };

  tikfinityWs.onerror = () => { tikfinityWs = null; };
}

connectTikFinity();

// ハートビート（controllerがsource.htmlの生存確認に使う）
setInterval(() => {
  const raw = localStorage.getItem('likerBottle_tikfinity');
  try {
    const s = raw ? JSON.parse(raw) : {};
    s.ts = Date.now();
    localStorage.setItem('likerBottle_tikfinity', JSON.stringify(s));
  } catch {
    localStorage.setItem('likerBottle_tikfinity', JSON.stringify({ connected: false, ts: Date.now() }));
  }
}, 3000);

// =============================================
// localStorage 監視（controllerからの操作を反映）
// =============================================
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) {
    state = loadState();
    updateLiquid();
  }
});

// 同一ウィンドウからの変更も拾うためポーリング（OBSは別プロセスのため）
let lastJson = JSON.stringify(state);
setInterval(() => {
  const current = localStorage.getItem(STORAGE_KEY);
  if (current && current !== lastJson) {
    lastJson = current;
    state = loadState();
    updateLiquid();
  }
}, 500);

// =============================================
// 液体レベル更新
// =============================================
function updateLiquid() {
  const rawPct = (state.likes / Math.max(1, state.goal)) * 100;
  const pct    = Math.min(100, rawPct); // 液体の高さは100%上限
  document.getElementById('percentNum').textContent = Math.round(rawPct); // 表示は上限なし

  const TOTAL_H = 245;
  const BOT_Y   = 333;
  const liqH    = (pct / 100) * TOTAL_H;
  const liqY    = BOT_Y - liqH;

  const rect = document.getElementById('liquidRect');
  const wave = document.getElementById('waveGroup');
  if (rect) { rect.setAttribute('y', liqY); rect.setAttribute('height', liqH + 1); }
  if (wave) { wave.setAttribute('transform', `translate(0,${liqY})`); }

  const gTop = document.getElementById('gTop');
  const gBot = document.getElementById('gBot');
  if (gTop) gTop.setAttribute('stop-color', state.liquidColor.top + 'bb');
  if (gBot) gBot.setAttribute('stop-color', state.liquidColor.bottom + 'ee');
}

// =============================================
// SVG 描画
// =============================================
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, children = []) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  for (const c of children) if (c) e.appendChild(c);
  return e;
}

const BOTTLE_PATHS = {
  perfume: {
    body: 'M100,88 Q80,92 62,108 Q38,130 36,162 L34,210 Q32,255 38,278 Q50,312 76,326 Q88,332 120,333 Q152,332 164,326 Q190,312 202,278 Q208,255 206,210 L204,162 Q202,130 178,108 Q160,92 140,88 Z',
    clip: 'M100,88 Q80,92 62,108 Q38,130 36,162 L34,210 Q32,255 38,278 Q50,312 76,326 Q88,332 120,333 Q152,332 164,326 Q190,312 202,278 Q208,255 206,210 L204,162 Q202,130 178,108 Q160,92 140,88 Z',
    neck: 'M96,60 L96,88 Q108,93 120,93 Q132,93 144,88 L144,60 Z',
    botY: 333, glare1: 'M50,130 Q44,180 46,250 Q47,290 52,315',
  },
  round: {
    body: 'M80,90 Q40,100 34,155 L32,220 Q30,280 40,305 Q60,340 120,342 Q180,340 200,305 Q210,280 208,220 L206,155 Q200,100 160,90 Z',
    clip: 'M80,90 Q40,100 34,155 L32,220 Q30,280 40,305 Q60,340 120,342 Q180,340 200,305 Q210,280 208,220 L206,155 Q200,100 160,90 Z',
    neck: 'M98,60 L98,90 Q108,94 120,94 Q132,94 142,90 L142,60 Z',
    botY: 342, glare1: 'M46,130 Q40,185 42,260 Q43,295 48,318',
  },
  square: {
    body: 'M78,90 L48,105 Q34,120 34,150 L34,280 Q34,320 70,332 L120,335 L170,332 Q206,320 206,280 L206,150 Q206,120 192,105 L162,90 Z',
    clip: 'M78,90 L48,105 Q34,120 34,150 L34,280 Q34,320 70,332 L120,335 L170,332 Q206,320 206,280 L206,150 Q206,120 192,105 L162,90 Z',
    neck: 'M96,60 L96,90 L144,90 L144,60 Z',
    botY: 335, glare1: 'M46,120 L46,310',
  },
};

function buildBottleSVG() {
  const bp = BOTTLE_PATHS.perfume;
  const svg = el('svg', { viewBox: '0 0 240 400', xmlns: ns });
  const defs = el('defs');

  const clipPath = el('clipPath', { id: 'bottleClip' });
  clipPath.appendChild(el('path', { d: bp.clip }));
  defs.appendChild(clipPath);

  const liqGrad = el('linearGradient', { id: 'liquidGrad', x1: '0', y1: '0', x2: '0', y2: '1' });
  const gTop = el('stop', { offset: '0%', 'stop-color': state.liquidColor.top + 'bb', id: 'gTop' });
  const gBot = el('stop', { offset: '100%', 'stop-color': state.liquidColor.bottom + 'ee', id: 'gBot' });
  liqGrad.appendChild(gTop); liqGrad.appendChild(gBot);
  defs.appendChild(liqGrad);

  const glassGrad = el('linearGradient', { id: 'glassGrad', x1: '0', y1: '0', x2: '1', y2: '0' });
  [['0%','rgba(160,200,235,0.55)'],['18%','rgba(200,228,250,0.28)'],['50%','rgba(200,228,250,0.18)'],['82%','rgba(200,228,250,0.28)'],['100%','rgba(160,200,235,0.55)']].forEach(([o,c]) => {
    glassGrad.appendChild(el('stop', { offset: o, 'stop-color': c }));
  });
  defs.appendChild(glassGrad);

  const crystalGrad = el('radialGradient', { id: 'crystalGrad', cx: '38%', cy: '32%' });
  [['0%','rgba(245,252,255,0.92)'],['55%','rgba(160,210,252,0.65)'],['100%','rgba(80,145,215,0.42)']].forEach(([o,c]) => {
    crystalGrad.appendChild(el('stop', { offset: o, 'stop-color': c }));
  });
  defs.appendChild(crystalGrad);

  const fGlow = el('filter', { id: 'glow' });
  fGlow.appendChild(el('feGaussianBlur', { stdDeviation: '3.5', result: 'blur' }));
  const fm = el('feMerge'); fm.appendChild(el('feMergeNode', { in: 'blur' })); fm.appendChild(el('feMergeNode', { in: 'SourceGraphic' })); fGlow.appendChild(fm);
  defs.appendChild(fGlow);

  const fSoft = el('filter', { id: 'softglow' });
  fSoft.appendChild(el('feGaussianBlur', { stdDeviation: '5', result: 'blur' }));
  const fm2 = el('feMerge'); fm2.appendChild(el('feMergeNode', { in: 'blur' })); fm2.appendChild(el('feMergeNode', { in: 'SourceGraphic' })); fSoft.appendChild(fm2);
  defs.appendChild(fSoft);

  svg.appendChild(defs);

  // 香り煙
  const smokeG = el('g');
  [{cx:116,cy:6,rx:4,ry:6,delay:'0s'},{cx:122,cy:2,rx:3,ry:5,delay:'1.1s'},{cx:119,cy:4,rx:3.5,ry:5.5,delay:'2.0s'}].forEach(s => {
    const e = el('ellipse', { cx: s.cx, cy: s.cy, rx: s.rx, ry: s.ry, fill: 'rgba(200,225,255,0.28)' });
    e.style.animation = `smoke-rise 3.2s ease-in-out infinite ${s.delay}`;
    smokeG.appendChild(e);
  });
  svg.appendChild(smokeG);

  // クリップグループ
  const clipG = el('g', { 'clip-path': 'url(#bottleClip)' });

  const liquidRect = el('rect', { id: 'liquidRect', x: '28', y: bp.botY, width: '185', height: '0', fill: 'url(#liquidGrad)' });
  clipG.appendChild(liquidRect);

  const waveG = el('g', { id: 'waveGroup', transform: `translate(0,${bp.botY})` });
  const w1 = el('path', { d: 'M-240,0 C-200,-18 -160,18 -120,0 C-80,-18 -40,18 0,0 C40,-18 80,18 120,0 C160,-18 200,18 240,0 C280,-18 320,18 360,0 L360,22 L-240,22 Z', fill: 'rgba(80,140,220,0.72)' });
  w1.style.animation = 'wave1 2.8s linear infinite';
  const w2 = el('path', { d: 'M-240,0 C-190,14 -140,-14 -90,0 C-40,14 10,-14 60,0 C110,14 160,-14 210,0 C260,14 310,-14 360,0 L360,16 L-240,16 Z', fill: 'rgba(120,175,240,0.32)' });
  w2.style.animation = 'wave2 2.1s linear infinite';
  waveG.appendChild(w1); waveG.appendChild(w2);
  clipG.appendChild(waveG);

  // フロートアイテム
  appendGems(clipG);
  appendStars(clipG);

  svg.appendChild(clipG);

  // 瓶本体
  svg.appendChild(el('path', { d: bp.body, fill: 'url(#glassGrad)', stroke: 'rgba(160,210,255,0.75)', 'stroke-width': '2' }));
  svg.appendChild(el('path', { d: bp.neck, fill: 'rgba(180,210,240,0.3)', stroke: 'rgba(160,210,255,0.65)', 'stroke-width': '1.8' }));
  svg.appendChild(el('rect', { x: '90', y: '73', width: '60', height: '11', rx: '5', fill: 'rgba(160,200,238,0.32)', stroke: 'rgba(210,235,255,0.38)', 'stroke-width': '1' }));
  svg.appendChild(el('ellipse', { cx: '120', cy: '60', rx: '36', ry: '10', fill: 'rgba(160,205,240,0.52)', stroke: 'rgba(180,225,255,0.72)', 'stroke-width': '1.8' }));
  svg.appendChild(el('path', { d: 'M90,60 L84,44 L90,22 L120,12 L150,22 L156,44 L150,60 Z', fill: 'url(#crystalGrad)', stroke: 'rgba(200,235,255,0.75)', 'stroke-width': '1.8' }));

  [['90,60','120,12'],['150,60','120,12'],['84,44','120,12'],['156,44','120,12'],['90,22','120,12'],['150,22','120,12']].forEach(([a,b]) => {
    const [x1,y1] = a.split(','); const [x2,y2] = b.split(',');
    svg.appendChild(el('line', { x1, y1, x2, y2, stroke: 'rgba(255,255,255,0.28)', 'stroke-width': '0.7' }));
  });
  svg.appendChild(el('line', { x1: '86', y1: '40', x2: '154', y2: '40', stroke: 'rgba(255,255,255,0.18)', 'stroke-width': '0.8' }));
  svg.appendChild(el('line', { x1: '89', y1: '26', x2: '151', y2: '26', stroke: 'rgba(255,255,255,0.14)', 'stroke-width': '0.7' }));
  svg.appendChild(el('circle', { cx: '120', cy: '12', r: '3.2', fill: 'rgba(255,255,255,0.92)', filter: 'url(#glow)' }));
  svg.appendChild(el('path', { d: bp.glare1, fill: 'none', stroke: 'rgba(240,250,255,0.16)', 'stroke-width': '10', 'stroke-linecap': 'round' }));
  svg.appendChild(el('ellipse', { cx: '120', cy: '346', rx: '46', ry: '9', fill: 'rgba(140,190,230,0.4)', stroke: 'rgba(200,228,255,0.32)', 'stroke-width': '1.2' }));
  svg.appendChild(el('rect', { x: '96', y: '333', width: '48', height: '14', rx: '2', fill: 'rgba(140,190,230,0.26)', stroke: 'rgba(200,228,255,0.28)', 'stroke-width': '1' }));

  return svg;
}

function appendGems(g) {
  [{cx:120,cy:220,r:22,delay:'0s',dur:'5.5s'},{cx:82,cy:278,r:14,delay:'1.2s',dur:'4.8s'},{cx:158,cy:255,r:12,delay:'0.6s',dur:'6.0s'},{cx:95,cy:305,r:8,delay:'2s',dur:'7s'},{cx:148,cy:295,r:7,delay:'3s',dur:'5.2s'}].forEach(({cx,cy,r,delay,dur}) => {
    const gg = el('g', { filter: 'url(#softglow)' });
    gg.style.animation = `float-gentle ${dur} ease-in-out infinite ${delay}`;
    gg.style.transformOrigin = `${cx}px ${cy}px`;
    const poly = el('polygon', { points: `${cx},${cy-r} ${cx+r*0.8},${cy} ${cx},${cy+r} ${cx-r*0.8},${cy}`, fill: 'none', opacity: '0.9' });
    poly.style.fill = `rgba(60,140,230,${0.7+r*0.01})`;
    gg.appendChild(poly);
    gg.appendChild(el('polygon', { points: `${cx},${cy-r} ${cx+r*0.4},${cy-r*0.3} ${cx},${cy-r*0.2} ${cx-r*0.4},${cy-r*0.3}`, fill: 'rgba(255,255,255,0.35)' }));
    [[`${cx},${cy-r}`,`${cx},${cy+r}`],[`${cx-r*0.8},${cy}`,`${cx+r*0.8},${cy}`]].forEach(([a,b]) => {
      const [x1,y1]=a.split(','); const [x2,y2]=b.split(',');
      gg.appendChild(el('line', { x1, y1, x2, y2, stroke: 'rgba(255,255,255,0.3)', 'stroke-width': '0.6' }));
    });
    g.appendChild(gg);
  });
}

function appendStars(g) {
  [{cx:75,cy:170,r:9,delay:'0s',dur:'2.4s'},{cx:163,cy:190,r:7,delay:'0.8s',dur:'1.9s'},{cx:90,cy:245,r:5,delay:'0.4s',dur:'2.8s'},{cx:152,cy:310,r:4,delay:'1.3s',dur:'2.1s'}].forEach(({cx,cy,r,delay,dur}) => {
    const pts = [];
    for (let i = 0; i < 5; i++) {
      const ao = -Math.PI/2 + i*2*Math.PI/5;
      const ai = ao + Math.PI/5;
      pts.push(`${cx+r*Math.cos(ao)},${cy+r*Math.sin(ao)}`);
      pts.push(`${cx+r*0.4*Math.cos(ai)},${cy+r*0.4*Math.sin(ai)}`);
    }
    const star = el('polygon', { points: pts.join(' '), fill: 'rgba(220,238,255,0.82)', filter: 'url(#glow)' });
    star.style.animation = `twinkle ${dur} ease-in-out infinite ${delay}`;
    g.appendChild(star);
  });
  [[105,185],[140,170],[172,225],[68,260],[135,300],[80,310]].forEach(([cx,cy],i) => {
    const c = el('circle', { cx, cy, r: '1.4', fill: 'rgba(210,235,255,0.7)', filter: 'url(#glow)' });
    c.style.animation = `twinkle ${1.7+i*0.3}s ease-in-out infinite ${i*0.4}s`;
    g.appendChild(c);
  });
}

// 初期描画
const svg = buildBottleSVG();
document.getElementById('bottleArea').insertBefore(svg, document.getElementById('bottleArea').firstChild);
updateLiquid();
</script>
</body>
</html>
