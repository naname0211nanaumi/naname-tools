<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Liker Bottle – Controller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0b0e1a;
  color:#c8dcf0;
  font-family:'Rajdhani', sans-serif;
  font-size:14px;
  padding:14px;
  min-width:220px;
}
h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:18px;
  font-weight:300;
  letter-spacing:0.12em;
  color:#a8d0f0;
  margin-bottom:14px;
  padding-bottom:8px;
  border-bottom:1px solid rgba(160,200,255,0.15);
}
.row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
label { font-size:12px; color:#88aac8; min-width:52px; }
input[type=number] {
  flex:1; background:#0f1628; border:1px solid rgba(120,170,220,0.25);
  color:#c8dcf0; padding:5px 8px; border-radius:4px;
  font-family:'Rajdhani', sans-serif; font-size:14px;
}
input[type=number]:focus { outline:none; border-color:rgba(120,190,255,0.5); }
button {
  background:rgba(80,130,210,0.18); border:1px solid rgba(100,160,240,0.35);
  color:#a8d0f5; padding:5px 14px; border-radius:4px;
  font-family:'Rajdhani', sans-serif; font-size:13px;
  cursor:pointer; transition:background 0.2s;
  white-space:nowrap;
}
button:hover { background:rgba(80,130,210,0.35); }
button.danger {
  background:rgba(210,80,80,0.15); border-color:rgba(240,100,100,0.3);
  color:#f0a0a0;
}
button.danger:hover { background:rgba(210,80,80,0.3); }
.sep { border:none; border-top:1px solid rgba(160,200,255,0.1); margin:12px 0; }
.status-box {
  font-size:11px; color:#607890;
  background:rgba(255,255,255,0.04);
  border-radius:4px; padding:6px 10px;
  line-height:1.6;
}
.status-box span { color:#7bcfff; }

/* ターゲットフレーム用（source.htmlがiframe内にある場合） */
#iframeWrap {
  display:none; /* OBSでは不要、デスクトップテスト用 */
}
</style>
</head>
<body>
<h1>Liker Bottle</h1>

<div class="row">
  <label>目標</label>
  <input type="number" id="goalInput" value="1000" min="1">
  <button onclick="applyGoal()">設定</button>
</div>

<div class="row">
  <label>いいね数</label>
  <input type="number" id="likesInput" value="0" min="0">
  <button onclick="applyLikes()">セット</button>
</div>

<div class="row">
  <label>追加</label>
  <input type="number" id="addInput" value="10" min="1">
  <button onclick="addLikes()">＋追加</button>
</div>

<hr class="sep">

<div class="row">
  <button class="danger" onclick="resetLikes()" style="flex:1;">リセット</button>
</div>

<hr class="sep">

<div class="status-box" id="statusBox">
  操作方法: OBSのカスタムブラウザドックで<br>
  このHTMLを開き、source.htmlをブラウザソースに追加してください。<br><br>
  <span>source.html</span> と同じウィンドウ内ならpostMessageで直接制御できます。
</div>

<script>
// postMessageでsource.htmlを制御
// OBSでは同一ウィンドウに複数ブラウザソースが独立しているため
// ローカルサーバー経由が確実だが、まず直接送信を試みる

function send(msg) {
  // 1) TikFinity server.js経由（ws://localhost:3000）
  sendViaWS(msg);
  // 2) postMessage（同一ページでiframe使う場合）
  // window.postMessage(msg, '*');
}

let ws = null;
function connectWS() {
  try {
    ws = new WebSocket('ws://localhost:3000');
    ws.onopen = () => {
      document.getElementById('statusBox').innerHTML =
        '<span>TikFinity server.js</span> に接続中。<br>わんコメが起動していればそちらが優先されます。';
    };
    ws.onclose = () => {
      ws = null;
      document.getElementById('statusBox').innerHTML =
        'server.js に接続できません。<br>わんコメ単体の場合、手動操作はこのページから行えません。<br><span>わんコメ起動中ならいいね検知は自動です。</span>';
      setTimeout(connectWS, 6000);
    };
    ws.onerror = () => {};
  } catch(e) {}
}

function sendViaWS(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function applyGoal() {
  const v = parseInt(document.getElementById('goalInput').value);
  if (!isNaN(v) && v > 0) send({ type:'set_goal', value:v });
}
function applyLikes() {
  const v = parseInt(document.getElementById('likesInput').value);
  if (!isNaN(v) && v >= 0) send({ type:'set_likes', value:v });
}
function addLikes() {
  const v = parseInt(document.getElementById('addInput').value);
  if (!isNaN(v) && v > 0) send({ type:'add_likes', value:v });
}
function resetLikes() {
  send({ type:'reset' });
  document.getElementById('likesInput').value = 0;
}

connectWS();
</script>
</body>
</html>
