<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>TikTok Endroll Vertical</title>
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: transparent;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      color: #ffffff;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(140,180,255,0.24), transparent 28%),
        radial-gradient(circle at 50% 35%, rgba(120,150,255,0.12), transparent 35%),
        linear-gradient(180deg, rgba(6,10,28,0.08), rgba(6,10,28,0.72));
    }

    #status {
      position: absolute;
      right: 26px;
      bottom: 20px;
      font-size: 20px;
      opacity: 0.7;
      z-index: 10;
      letter-spacing: 0.04em;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #overlay.show {
      display: flex;
    }

    #rollViewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
      );
    }

    #roll {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 760px;
      padding: 120px 30px 180px;
      text-align: center;
      will-change: transform;
    }

    .title {
      font-size: 76px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      text-shadow: 0 0 30px rgba(150, 190, 255, 0.38);
    }

    .subtitle {
      font-size: 34px;
      opacity: 0.88;
      margin-bottom: 90px;
      line-height: 1.6;
    }

    .section {
      margin-bottom: 64px;
      padding: 30px 26px;
      border-radius: 28px;
      background: rgba(12, 20, 52, 0.5);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
    }

    .section h2 {
      margin: 0 0 24px;
      font-size: 42px;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .summaryGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .summaryCard {
      padding: 22px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
    }

    .summaryLabel {
      font-size: 20px;
      opacity: 0.82;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .summaryValue {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.2;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px 14px;
      align-items: start;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      text-align: left;
    }

    .rank {
      font-size: 28px;
      font-weight: 700;
      opacity: 0.95;
      line-height: 1.2;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .value {
      font-size: 24px;
      opacity: 0.92;
      line-height: 1.5;
      word-break: break-word;
    }

    .ending {
      margin-top: 40px;
      font-size: 50px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.5;
      text-shadow: 0 0 24px rgba(255,255,255,0.18);
    }

    .ending-sub {
      margin-top: 18px;
      font-size: 28px;
      opacity: 0.86;
      line-height: 1.7;
    }

    .empty {
      opacity: 0.72;
      font-size: 24px;
      line-height: 1.6;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="overlay">
      <div id="rollViewport">
        <div id="roll"></div>
      </div>
    </div>
    <div id="status">○ standby</div>
  </div>

  <script>
    const wsUrl = "ws://localhost:3000";
    let ws = null;
    let lastData = null;
    let animId = null;
    let currentY = 0;
    let speed = 1.0; // 縦画面なので少しゆっくり
    let isShowing = false;

    const statusEl = document.getElementById("status");
    const overlayEl = document.getElementById("overlay");
    const rollEl = document.getElementById("roll");
    const viewportEl = document.getElementById("rollViewport");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatNumber(n) {
      return Number(n || 0).toLocaleString("ja-JP");
    }

    function listRows(items, valueFormatter) {
      if (!items || items.length === 0) {
        return `<div class="empty">該当者なし</div>`;
      }

      return `
        <div class="list">
          ${items.map((item, i) => `
            <div class="row">
              <div class="rank">#${i + 1}</div>
              <div class="main">
                <div class="name">${escapeHtml(item.name)}</div>
                <div class="value">${valueFormatter(item)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderEndroll(data) {
      lastData = data;

      const html = `
        <div class="title">Special Thanks</div>
        <div class="subtitle">応援してくれたみんなへ<br>ありがとう</div>

        <section class="section">
          <h2>Summary</h2>
          <div class="summaryGrid">
            <div class="summaryCard">
              <div class="summaryLabel">Total Likes</div>
              <div class="summaryValue">${formatNumber(data.summary.totalLikes)}</div>
            </div>
            <div class="summaryCard">
              <div class="summaryLabel">Total Gift Coins</div>
              <div class="summaryValue">${formatNumber(data.summary.totalGiftCoins)}</div>
            </div>
            <div class="summaryCard">
              <div class="summaryLabel">Gifters</div>
              <div class="summaryValue">${formatNumber(data.summary.gifterCount)}</div>
            </div>
            <div class="summaryCard">
              <div class="summaryLabel">Likers</div>
              <div class="summaryValue">${formatNumber(data.summary.likerCount)}</div>
            </div>
          </div>
        </section>

        <section class="section">
          <h2>Gift Supporters</h2>
          ${listRows(data.allGifters, (item) =>
            `${formatNumber(item.coins)} coins / ${formatNumber(item.giftCount)} gifts`
          )}
        </section>

        <section class="section">
          <h2>Like Supporters</h2>
          ${listRows(data.allLikers, (item) =>
            `${formatNumber(item.likes)} likes`
          )}
        </section>

        <div class="ending">Thank you for watching</div>
        <div class="ending-sub">これからもよろしくね</div>
      `;

      rollEl.innerHTML = html;
    }

    function stopAnimation() {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
    }

    function startAnimation() {
      stopAnimation();

      overlayEl.classList.add("show");
      isShowing = true;

      const viewportHeight = viewportEl.clientHeight;
      const rollHeight = rollEl.scrollHeight;

      currentY = viewportHeight;
      rollEl.style.transform = `translateX(-50%) translateY(${currentY}px)`;

      function tick() {
        currentY -= speed;
        rollEl.style.transform = `translateX(-50%) translateY(${currentY}px)`;

        if (currentY < -rollHeight - 120) {
          stopEndroll();
          return;
        }

        animId = requestAnimationFrame(tick);
      }

      animId = requestAnimationFrame(tick);
    }

    function stopEndroll() {
      stopAnimation();
      overlayEl.classList.remove("show");
      isShowing = false;
    }

    function connect() {
      try {
        ws = new WebSocket(wsUrl);
      } catch (e) {
        setStatus("× websocket error");
        setTimeout(connect, 3000);
        return;
      }

      ws.onopen = () => {
        setStatus("● connected");
      };

      ws.onmessage = (ev) => {
        let msg;
        try {
          msg = JSON.parse(ev.data);
        } catch {
          return;
        }

        if (msg.type === "state" && msg.data && msg.data.endrollData) {
          renderEndroll(msg.data.endrollData);
          return;
        }

        if (msg.type === "endroll_data") {
          renderEndroll(msg.data);
          return;
        }

        if (msg.type === "start_endroll") {
          if (msg.data) renderEndroll(msg.data);
          startAnimation();
          return;
        }

        if (msg.type === "stop_endroll") {
          stopEndroll();
          return;
        }

        if (msg.type === "session_reset") {
          stopEndroll();
          renderEndroll({
            summary: { totalLikes: 0, totalGiftCoins: 0, likerCount: 0, gifterCount: 0 },
            allGifters: [],
            allLikers: []
          });
          return;
        }
      };

      ws.onclose = () => {
        setStatus("○ reconnecting...");
        stopAnimation();
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setStatus("× websocket failed");
      };
    }

    renderEndroll({
      summary: { totalLikes: 0, totalGiftCoins: 0, likerCount: 0, gifterCount: 0 },
      allGifters: [],
      allLikers: []
    });

    connect();
  </script>
</body>
</html>
