<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  overflow: hidden;
  user-select: none;
}

.container {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.header {
  text-align: center;
}
.header-title {
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
}
.header-subtitle {
  font-size: 14px;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

.grid {
  display: grid;
  gap: 5px;
}

.block {
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  cursor: default;
}

.block-name {
  text-align: center;
  font-size: 12px;
  font-weight: bold;
  padding: 4px 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.block-image {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  min-height: 60px;
}

.block-image img {
  max-width: 100%;
  max-height: 72px;
  object-fit: contain;
  display: block;
}

.block-band {
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  background: #f472b6;
  color: #fff;
  padding: 3px 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.footer {
  text-align: center;
}
.win-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

/* フラッシュアニメーション（gift_received） */
@keyframes blockPulse {
  0%   { filter: brightness(1); }
  20%  { filter: brightness(2.2) saturate(1.5); }
  40%  { filter: brightness(1); }
  60%  { filter: brightness(2.2) saturate(1.5); }
  80%  { filter: brightness(1); }
  100% { filter: brightness(1); }
}
.flash {
  animation: blockPulse 0.6s ease-in-out;
}

/* スライドフェード */
@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.fading-out { animation: fadeOut 0.3s forwards; }
.fading-in  { animation: fadeIn 0.3s forwards; }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="header" id="header"></div>
  <div class="grid"   id="grid"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
let db = null;
let currentPage = 0;
let slideTimer = null;
let transitioning = false;

// ===== WebSocket =====
function connect() {
  const ws = new WebSocket('ws://' + location.host);

  ws.addEventListener('message', (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'set_updated') {
      db = msg.data;
      currentPage = 0;
      stopSlide();
      render();
      startSlide();
    } else if (msg.type === 'gift_received') {
      flashBlock(msg.blockId);
    }
  });

  ws.addEventListener('close', () => setTimeout(connect, 3000));
  ws.addEventListener('error', () => ws.close());
}
connect();

// ===== ユーティリティ =====
function activeSet() {
  return db?.sets?.find(s => s.id === db.activeSetId) ?? null;
}

function blockColor(block, set) {
  const base = block.obstacleType === 'obstacle' ? set.obstacleColor : set.helpColor;
  const ov = block.colorOverride ?? {};
  return {
    bg:          ov.bg          ?? base.bg,
    text:        ov.text        ?? base.text,
    border:      ov.border      ?? base.border,
    borderWidth: ov.borderWidth ?? base.borderWidth,
  };
}

// ===== 描画 =====
function render() {
  const set = activeSet();
  if (!set) return;

  renderHeader(set);
  renderFooter(set);

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${set.layoutColumns}, 1fr)`;

  renderPage(set);
}

function renderHeader(set) {
  const el = document.getElementById('header');
  const hasContent = set.title || set.subtitle;
  el.style.display = hasContent ? '' : 'none';
  el.innerHTML = '';
  if (set.title) {
    const t = document.createElement('div');
    t.className = 'header-title';
    t.textContent = set.title;
    el.appendChild(t);
  }
  if (set.subtitle) {
    const s = document.createElement('div');
    s.className = 'header-subtitle';
    s.textContent = set.subtitle;
    el.appendChild(s);
  }
}

function renderFooter(set) {
  const el = document.getElementById('footer');
  el.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'win-row';

  const label = document.createElement('span');
  label.textContent = set.winCounterLabel;

  const count = document.createElement('span');
  count.id = 'win-count';
  count.textContent = set.winCount;

  const unit = document.createElement('span');
  unit.textContent = set.winCounterUnit;

  row.appendChild(label);
  row.appendChild(count);
  row.appendChild(unit);
  el.appendChild(row);
}

function renderPage(set) {
  const enabled = set.blocks.filter(b => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  const totalPages = Math.max(1, Math.ceil(enabled.length / maxPerPage));
  const page = Math.min(currentPage, totalPages - 1);

  const slice = enabled.slice(page * maxPerPage, (page + 1) * maxPerPage);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (const block of slice) {
    grid.appendChild(makeBlockEl(block, set));
  }
}

function makeBlockEl(block, set) {
  const c = blockColor(block, set);
  const border = `${c.borderWidth}px solid ${c.border}`;

  const wrap = document.createElement('div');
  wrap.className = 'block';
  wrap.dataset.blockId = block.id;
  wrap.style.cssText = `background:${c.bg};border:${border};`;

  const name = document.createElement('div');
  name.className = 'block-name';
  name.textContent = block.obstacleName;
  name.style.cssText = `background:${c.bg};color:${c.text};border-bottom:${border};`;
  wrap.appendChild(name);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'block-image';
  if (block.gift?.giftImageURL) {
    const img = document.createElement('img');
    img.src = block.gift.giftImageURL;
    img.style.transform = `scale(${block.imageScale ?? 1})`;
    imgWrap.appendChild(img);
  }
  wrap.appendChild(imgWrap);

  if (block.bandEnabled && block.bandText) {
    const band = document.createElement('div');
    band.className = 'block-band';
    band.textContent = block.bandText;
    wrap.appendChild(band);
  }

  return wrap;
}

// ===== フラッシュ =====
function flashBlock(blockId) {
  const el = document.querySelector(`[data-block-id="${blockId}"]`);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
}

// ===== スライド =====
function startSlide() {
  const set = activeSet();
  if (!set || !db) return;

  const enabled = set.blocks.filter(b => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  if (enabled.length <= maxPerPage) return;

  const ms = Math.max(1, db.slideIntervalSec ?? 3) * 1000;
  slideTimer = setInterval(slidePage, ms);
}

function stopSlide() {
  clearInterval(slideTimer);
  slideTimer = null;
  transitioning = false;
}

function slidePage() {
  if (transitioning) return;
  const set = activeSet();
  if (!set) return;

  const enabled = set.blocks.filter(b => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  const totalPages = Math.max(1, Math.ceil(enabled.length / maxPerPage));

  const grid = document.getElementById('grid');
  transitioning = true;

  grid.classList.add('fading-out');
  setTimeout(() => {
    grid.classList.remove('fading-out');
    currentPage = (currentPage + 1) % totalPages;
    renderPage(set);
    grid.classList.add('fading-in');
    setTimeout(() => {
      grid.classList.remove('fading-in');
      transitioning = false;
    }, 300);
  }, 300);
}
</script>
</body>
</html>
