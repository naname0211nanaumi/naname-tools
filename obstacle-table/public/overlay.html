<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>妨害表 Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
  /* ============================================
     基本：透過背景・OBS Browser Source想定
     ============================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    font-family: "Mochiy Pop One", "Yusei Magic", "Hiragino Maru Gothic Pro",
                 "ヒラギノ丸ゴ ProN", "Comic Sans MS", sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== カラー変数 ===== */
  :root {
    --sky-blue: #5fc1e8;
    --sky-blue-dark: #3aa8d4;
    --sky-blue-light: #a5dcef;
    --pink: #f4b3c2;
    --pink-dark: #e88aa2;
    --pink-light: #fcd9e0;
    --frame-white: #ffffff;
    --text-shadow-strong: 2px 2px 0 #2a6a85, -2px -2px 0 #2a6a85,
                          2px -2px 0 #2a6a85, -2px 2px 0 #2a6a85,
                          0 2px 0 #2a6a85, 2px 0 0 #2a6a85;
  }

  /* ===== タイトル行（青ボックスの外・上に配置） ===== */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 8px 12px 4px;
  }

  /* ===== ヘッダー（サブタイトルのみ） ===== */
  .header {
    margin: 0 12px 8px;
    background: var(--sky-blue);
    border: 4px solid var(--frame-white);
    border-radius: 12px;
    padding: 8px 16px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  }

  .title {
    font-size: 38px;
    font-weight: 900;
    color: var(--frame-white);
    -webkit-text-stroke: 2px #2a6a85;
    text-shadow: 3px 3px 0 #2a6a85, -1px -1px 0 #2a6a85,
                 1px -1px 0 #2a6a85, -1px 1px 0 #2a6a85;
    letter-spacing: 0.05em;
    line-height: 1;
    paint-order: stroke fill;
  }

  .win-counter {
    background: var(--frame-white);
    border: 3px solid var(--sky-blue-dark);
    border-radius: 10px;
    padding: 4px 10px;
    text-align: center;
    line-height: 1.1;
    color: #2a6a85;
    font-weight: 800;
    flex-shrink: 0;
  }
  .win-counter-label {
    font-size: 14px;
    display: block;
  }
  .win-counter-num {
    font-size: 22px;
    color: #ff3a7a;
    display: inline-block;
  }
  .win-counter-unit {
    font-size: 14px;
    display: inline-block;
  }

  .subtitle {
    text-align: center;
    color: var(--frame-white);
    font-size: 16px;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: 0.02em;
    -webkit-text-stroke: 1px #2a6a85;
    text-shadow: 1px 1px 0 #2a6a85;
    paint-order: stroke fill;
  }

  /* ===== ブロックグリッド ===== */
  .grid {
    margin: 0 12px;
    display: grid;
    gap: 8px;
  }

  .block {
    /* background / border はインラインスタイルで上書き */
    background: var(--sky-blue-light);
    border: 3px solid var(--frame-white);
    border-radius: 12px;
    aspect-ratio: 1 / 1;
    padding: 4px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
  }

  .block-image {
    width: 90%;
    height: 90%;
    object-fit: contain;
    transition: transform 0.15s;
  }

  .block-name {
    position: absolute;
    left: 4px;
    right: 4px;
    bottom: 4px;
    /* background / color / border はインラインスタイルで上書き */
    background: var(--sky-blue);
    color: var(--frame-white);
    font-size: 13px;
    font-weight: 800;
    text-align: center;
    padding: 2px 4px;
    border-radius: 6px;
    -webkit-text-stroke: 0.5px rgba(0,0,0,0.5);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    paint-order: stroke fill;
    line-height: 1.15;
    border: 2px solid var(--frame-white);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 22px;
  }

  /* お助け帯（左上にナナメに）- 固定ピンク、変更不要 */
  .block-band {
    position: absolute;
    top: 0;
    left: 0;
    background: var(--pink-dark);
    color: var(--frame-white);
    font-size: 11px;
    font-weight: 800;
    padding: 2px 14px;
    transform: rotate(-30deg) translate(-30%, 30%);
    transform-origin: top left;
    text-shadow: 1px 1px 0 #8a3a52;
    border: 2px solid var(--frame-white);
    border-radius: 4px;
    z-index: 2;
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
  }

  /* ===== 現在のWIN数フッター ===== */
  .footer {
    margin: 12px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
  }

  .footer-rules {
    background: var(--sky-blue);
    border: 4px solid var(--frame-white);
    border-radius: 12px;
    min-height: 80px;
    padding: 8px 12px;
    color: var(--frame-white);
    font-weight: 800;
    text-shadow: 1px 1px 0 #2a6a85;
    font-size: 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  }

  .footer-win {
    background: var(--sky-blue);
    border: 4px solid var(--frame-white);
    border-radius: 12px;
    min-height: 80px;
    padding: 4px 8px;
    color: var(--frame-white);
    text-align: center;
    text-shadow: 1px 1px 0 #2a6a85;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .footer-win-label {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .footer-win-num {
    font-size: 36px;
    font-weight: 900;
    color: #fff14a;
    text-shadow: 2px 2px 0 #b8830f;
    line-height: 1;
  }

  /* ===== ギフト受信エフェクト ===== */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }
  .block.flash .block-image {
    animation: pulse 0.6s ease;
  }

  /* ===== スライドフェード ===== */
  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .grid.fading-out { animation: fadeOut 0.3s forwards; }
  .grid.fading-in  { animation: fadeIn 0.3s forwards; }
</style>
</head>
<body>

<div class="title-row">
  <div class="title" id="title">GTA山登り</div>
  <div class="win-counter">
    <span class="win-counter-label" id="winCounterLabel">ホラゲ残り</span>
    <span class="win-counter-num" id="winCount">43</span><span
      class="win-counter-unit" id="winCounterUnit">個</span>
  </div>
</div>
<div class="header">
  <div class="subtitle" id="subtitle">-1WINごとにホラゲー+1 / +1WINごとにホラゲー-1</div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  <div class="footer-rules" id="footerRules"></div>
  <div class="footer-win">
    <div class="footer-win-label" id="currentWinLabel">現在のWIN数</div>
    <div class="footer-win-num" id="currentWin">0</div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

// ===== State =====
let currentSet = null;
let currentSlideIntervalSec = 3;
let currentPage = 0;
let slideTimer = null;
let isTransitioning = false;

// ===== カラーユーティリティ =====
function getBlockColor(b, set) {
  const base = b.obstacleType === "help" ? set.helpColor : set.obstacleColor;
  if (!base) return null;
  const ov = b.colorOverride ?? {};
  return {
    bg:          ov.bg          ?? base.bg,
    text:        ov.text        ?? base.text,
    border:      ov.border      ?? base.border,
    borderWidth: ov.borderWidth ?? base.borderWidth,
  };
}

// ===== 描画 =====
function render(set) {
  $("title").textContent = set.title || "";
  $("subtitle").textContent = set.subtitle || "";
  $("winCounterLabel").textContent = set.winCounterLabel || "";
  $("winCount").textContent = set.winCount ?? 0;
  $("winCounterUnit").textContent = set.winCounterUnit || "";
  $("currentWinLabel").textContent = set.currentWinLabel || "現在のWIN数";
  $("currentWin").textContent = set.currentWin ?? 0;
  $("footerRules").textContent = "";

  const cols = Math.max(1, Math.min(10, set.layoutColumns || 7));
  $("grid").style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  renderPage(set);
}

function renderPage(set) {
  const enabled = (set.blocks || []).filter((b) => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  const totalPages = Math.max(1, Math.ceil(enabled.length / maxPerPage));
  const page = currentPage % totalPages;
  const slice = enabled.slice(page * maxPerPage, (page + 1) * maxPerPage);

  const grid = $("grid");
  grid.innerHTML = "";

  for (const b of slice) {
    grid.appendChild(makeBlockEl(b, set));
  }
}

function makeBlockEl(b, set) {
  const color = getBlockColor(b, set);
  const imgScale = b.imageScale ?? 1.0;

  const div = document.createElement("div");
  div.className = "block";
  div.dataset.blockId = b.id;

  if (color) {
    div.style.background = color.bg;
    div.style.border = `${color.borderWidth}px solid ${color.border}`;
  }

  // お助け帯（固定ピンク）
  if (b.bandEnabled && b.bandText) {
    const band = document.createElement("div");
    band.className = "block-band";
    band.textContent = b.bandText;
    div.appendChild(band);
  }

  // ギフト画像
  if (b.gift?.giftImageURL) {
    const img = document.createElement("img");
    img.className = "block-image";
    img.src = b.gift.giftImageURL;
    img.style.transform = `scale(${imgScale})`;
    img.alt = "";
    div.appendChild(img);
  }

  // 妨害名ラベル
  const nameEl = document.createElement("div");
  nameEl.className = "block-name";
  nameEl.textContent = b.obstacleName || "";
  if (color) {
    nameEl.style.background = color.bg;
    nameEl.style.color = color.text;
    nameEl.style.borderColor = color.border;
    nameEl.style.borderWidth = `${color.borderWidth}px`;
    nameEl.style.borderStyle = "solid";
  }
  div.appendChild(nameEl);

  return div;
}

// ===== スライド =====
function startSlide(set, intervalSec) {
  stopSlide();
  const enabled = (set.blocks || []).filter((b) => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  if (enabled.length <= maxPerPage) return;

  const ms = Math.max(1, intervalSec ?? 3) * 1000;
  slideTimer = setInterval(() => slidePage(set), ms);
}

function stopSlide() {
  clearInterval(slideTimer);
  slideTimer = null;
  isTransitioning = false;
}

function slidePage(set) {
  if (isTransitioning) return;
  const enabled = (set.blocks || []).filter((b) => b.enabled);
  const maxPerPage = set.layoutColumns * 2;
  const totalPages = Math.max(1, Math.ceil(enabled.length / maxPerPage));

  const grid = $("grid");
  isTransitioning = true;
  grid.classList.add("fading-out");

  setTimeout(() => {
    grid.classList.remove("fading-out");
    currentPage = (currentPage + 1) % totalPages;
    renderPage(set);
    grid.classList.add("fading-in");
    setTimeout(() => {
      grid.classList.remove("fading-in");
      isTransitioning = false;
    }, 300);
  }, 300);
}

// ===== 全体更新 =====
function applyUpdate(set, slideIntervalSec) {
  currentSet = set;
  currentSlideIntervalSec = slideIntervalSec ?? 3;
  currentPage = 0;
  stopSlide();
  render(set);
  startSlide(set, currentSlideIntervalSec);
}

// ===== 初回ロード =====
fetch("/api/active-set")
  .then((r) => r.json())
  .then((data) => {
    // サーバーが { ...set, slideIntervalSec } を返す
    const { slideIntervalSec, ...set } = data;
    applyUpdate(set, slideIntervalSec);
  })
  .catch((e) => console.error("load failed", e));

// ===== WebSocket =====
const ws = new WebSocket(`ws://${location.host}/`);
ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === "set_updated") {
    applyUpdate(msg.data, msg.slideIntervalSec);
  } else if (msg.type === "gift_received") {
    const el = document.querySelector(`[data-block-id="${msg.blockId}"]`);
    if (el) {
      el.classList.remove("flash");
      void el.offsetWidth;
      el.classList.add("flash");
    }
  }
};
ws.onclose = () => {
  setTimeout(() => location.reload(), 2000);
};
</script>

</body>
</html>
